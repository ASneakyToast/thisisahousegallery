<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}This is a House Gallery{% endblock %}</title>
    <!--[if mso]>
    <style>
        table { border-collapse: collapse; }
        td { font-family: Arial, sans-serif; }
    </style>
    <![endif]-->
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fefefe;
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }
        table {
            border-spacing: 0;
            border-collapse: collapse;
        }
        img {
            border: 0;
            outline: none;
            text-decoration: none;
        }
        a {
            color: #121212;
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #fefefe;">
    <!-- Preheader text (hidden, shows in email preview) -->
    <div style="display: none; max-height: 0; overflow: hidden; font-size: 1px; line-height: 1px; color: #fefefe;">
        {% block preheader %}News from This is a House Gallery{% endblock %}
        &#847; &#847; &#847; &#847; &#847;
    </div>

    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #fefefe;">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width: 600px; width: 100%;">

                    <!-- Header -->
                    <tr>
                        <td style="padding: 0 0 30px; border-bottom: 1px solid #121212;">
                            <p style="font-family: 'Source Code Pro', 'Courier New', monospace; font-weight: 300; font-size: 14px; margin: 0; color: #121212;">
                                This is a House Gallery
                            </p>
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td style="padding: 30px 0;">
                            {% block content %}{% endblock %}
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding: 30px 0 0; border-top: 1px solid #121212;">
                            <p style="font-family: 'Source Code Pro', 'Courier New', monospace; font-weight: 300; font-size: 10px; line-height: 1.6; margin: 0; color: #666;">
                                This is a House Gallery
                                <br>
                                <a href="{{ unsubscribe_url }}" style="color: #666; text-decoration: underline;">Unsubscribe</a>
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
