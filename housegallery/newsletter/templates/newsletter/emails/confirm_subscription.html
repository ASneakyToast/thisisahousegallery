<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm your subscription</title>
</head>
<body style="margin: 0; padding: 0; background-color: #fefefe;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #fefefe;">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width: 600px; width: 100%;">

                    <!-- Header -->
                    <tr>
                        <td style="padding: 0 0 30px; border-bottom: 1px solid #121212;">
                            <p style="font-family: 'Source Code Pro', 'Courier New', monospace; font-weight: 300; font-size: 14px; margin: 0; color: #121212;">
                                This is a House Gallery
                            </p>
                        </td>
                    </tr>

                    <!-- Content -->
                    <tr>
                        <td style="padding: 30px 0;">
                            <h1 style="font-family: 'Source Code Pro', 'Courier New', monospace; font-weight: 300; font-size: 24px; margin: 0 0 20px; color: #121212;">
                                Confirm your subscription
                            </h1>
                            <p style="font-family: 'Source Code Pro', 'Courier New', monospace; font-weight: 300; font-size: 14px; line-height: 1.8; margin: 0 0 24px; color: #121212;">
                                You requested to subscribe to the This is a House Gallery newsletter
                                with the email address {{ email }}.
                            </p>
                            <p style="margin: 0 0 24px;">
                                <a href="{{ confirm_url }}"
                                   style="font-family: 'Source Code Pro', 'Courier New', monospace; font-weight: 400; font-size: 14px; color: #fefefe; background-color: #121212; padding: 12px 24px; text-decoration: none; display: inline-block;">
                                    Confirm subscription
                                </a>
                            </p>
                            <p style="font-family: 'Source Code Pro', 'Courier New', monospace; font-weight: 300; font-size: 12px; line-height: 1.6; margin: 0; color: #666;">
                                If you didn't request this, you can ignore this email.
                            </p>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="padding: 30px 0 0; border-top: 1px solid #121212;">
                            <p style="font-family: 'Source Code Pro', 'Courier New', monospace; font-weight: 300; font-size: 10px; line-height: 1.6; margin: 0; color: #666;">
                                This is a House Gallery
                            </p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>
</html>
