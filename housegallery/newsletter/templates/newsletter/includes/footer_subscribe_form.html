<div class="footer-subscribe">
    <p class="footer-subscribe__label">Newsletter</p>
    <form class="footer-subscribe__form" id="footer-newsletter-form" action="{% url 'newsletter:subscribe' %}" method="post">
        {% csrf_token %}
        <input type="email"
               name="email"
               placeholder="your@email.com"
               required
               class="footer-subscribe__input"
               aria-label="Email address">
        <button type="submit" class="footer-subscribe__button">Subscribe</button>
    </form>
    <div class="footer-subscribe__messages" id="footer-newsletter-messages"></div>
</div>
