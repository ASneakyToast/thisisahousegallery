{% load wagtailcore_tags %}

<aside class="kiosk-subscription" id="kiosk-subscription">
    <div class="subscription-content">
        <h2 class="subscription-title">{{ value.prompt }}</h2>
        <form class="subscription-form" id="subscription-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="email" class="sr-only">Email address</label>
                <input type="email"
                       id="email"
                       name="email"
                       placeholder="Enter your email address"
                       required
                       class="form-input">
                <button type="submit" class="form-submit">
                    {{ value.button_text }}
                </button>
            </div>
            <div class="form-messages" id="form-messages"></div>
        </form>
    </div>
</aside>

<script>
    (function() {
        var form = document.getElementById('subscription-form');
        if (form && !form.dataset.bound) {
            form.dataset.bound = 'true';
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                var formData = new FormData(form);
                var messages = document.getElementById('form-messages');
                var submitBtn = form.querySelector('.form-submit');

                submitBtn.disabled = true;
                submitBtn.textContent = 'Subscribing...';

                try {
                    var response = await fetch('{% url "newsletter:subscribe" %}', {
                        method: 'POST',
                        body: formData
                    });
                    var data = await response.json();
                    if (data.success) {
                        messages.innerHTML = '<div class="message success">' + data.message + '</div>';
                        form.reset();
                    } else {
                        messages.innerHTML = '<div class="message error">' + data.error + '</div>';
                    }
                } catch (error) {
                    messages.innerHTML = '<div class="message error">Connection error. Please try again.</div>';
                }

                submitBtn.disabled = false;
                submitBtn.textContent = '{{ value.button_text }}';
            });
        }
    })();
</script>
